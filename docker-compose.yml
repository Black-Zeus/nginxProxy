services:
  nginx:
    image: nginx:1.30.0-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - proxy
      - itop
      - itophub
      - n8n

networks:
  proxy:
    driver: bridge
  itop:
    external: true
    name: itop_default
  itophub:
    external: true
    name: itophub_internal
  n8n:
    external: true
    name: n8n_network
